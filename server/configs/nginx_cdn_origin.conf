# PHANTOM CDN origin (cdn mode)
# ------------------------------
# The CDN terminates TLS and origin-pulls plain HTTP from this port.
# nginx routes the secret XHTTP path to the local Xray listener and serves a
# real website for every other request (anti-probe). No TLS here — the CDN
# already handled it.
#
# Replace PHANTOM_DOMAIN and PHANTOM_TOKEN. Set your CDN origin to:
#   protocol HTTP, host = your server IP, port = 8080.

server {
    listen 127.0.0.1:8080;
    server_name PHANTOM_DOMAIN;

    # --- Secret XHTTP path → Xray ---
    location /phantom/PHANTOM_TOKEN {
        proxy_pass              http://127.0.0.1:10000;
        proxy_http_version      1.1;
        proxy_set_header        Host            $host;
        proxy_set_header        X-Real-IP       $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering         off;
        proxy_request_buffering off;
        client_max_body_size    0;
        proxy_read_timeout      300s;
        proxy_send_timeout      300s;
    }

    # --- Anti-probe: everything else looks like a real website ---
    location / {
        resolver              1.1.1.1 8.8.8.8 ipv6=off valid=300s;
        set $phantom_fallback "www.iana.org";
        proxy_pass            https://$phantom_fallback;
        proxy_ssl_server_name on;
        proxy_ssl_name        www.iana.org;
        proxy_set_header      Host            www.iana.org;
        proxy_set_header      X-Real-IP       $remote_addr;
        proxy_set_header      Accept-Encoding "";
        proxy_hide_header     X-Powered-By;
        proxy_hide_header     CF-Ray;
        proxy_hide_header     CF-Cache-Status;
        add_header            X-Content-Type-Options "nosniff" always;
    }
}
