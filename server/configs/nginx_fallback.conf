# PHANTOM anti-probe nginx fallback
# -----------------------------------
# Unauthenticated requests to the PHANTOM server get a real HTTP response
# from a legitimate website (forwarded by nginx).
# Active probers see a normal web server, not a VPN endpoint.
#
# Usage: include this file in your nginx.conf, or copy into /etc/nginx/sites-enabled/

server {
    listen 127.0.0.1:8080;
    server_name _;          # matches any Host; Xray fallback sends plain HTTP here

    # Proxy all requests to a real, high-traffic website.
    # Any well-known site works; iana.org is neutral and always up.
    location / {
        proxy_pass              https://www.iana.org;
        proxy_ssl_server_name   on;
        proxy_set_header        Host                www.iana.org;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        Accept-Encoding     "";

        # Strip headers that would reveal the real origin to a clever prober
        proxy_hide_header       X-Powered-By;
        proxy_hide_header       x-amz-id-2;
        proxy_hide_header       x-amz-request-id;
        proxy_hide_header       CF-Ray;
        proxy_hide_header       CF-Cache-Status;

        # Present as a plain nginx server
        add_header              Server              "nginx/1.24.0"  always;
        add_header              X-Content-Type-Options "nosniff"   always;

        proxy_connect_timeout   5s;
        proxy_read_timeout      15s;
    }
}
