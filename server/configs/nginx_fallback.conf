# PHANTOM nginx TLS front (Direct mode)
# --------------------------------------
# nginx terminates TLS on :443 and:
#   • reverse-proxies the secret WebSocket path to the local Xray listener
#     (the path lives inside TLS, invisible to DPI);
#   • serves real web content for every other request, so active probers and
#     DPI see an ordinary website and no trace of a VPN.
#
# Replace PHANTOM_DOMAIN and PHANTOM_TOKEN, then copy into
# /etc/nginx/sites-enabled/ (and disable the default site if it owns :443).

server {
    listen 80;
    listen [::]:80;
    server_name PHANTOM_DOMAIN;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name PHANTOM_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/PHANTOM_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/PHANTOM_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Secret WebSocket path → Xray (invisible inside TLS) ---
    location = /phantom/PHANTOM_TOKEN {
        if ($http_upgrade != "websocket") { return 404; }
        proxy_pass            http://127.0.0.1:10000;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade    $http_upgrade;
        proxy_set_header      Connection "upgrade";
        proxy_set_header      Host       $host;
        proxy_set_header      X-Real-IP  $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }

    # --- Anti-probe: everything else looks like a real website ---
    location / {
        resolver                1.1.1.1 8.8.8.8 ipv6=off valid=300s;
        set $phantom_fallback   "www.iana.org";
        proxy_pass              https://$phantom_fallback;
        proxy_ssl_server_name   on;
        proxy_ssl_name          www.iana.org;
        proxy_set_header        Host                www.iana.org;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        Accept-Encoding     "";

        # Strip headers that would reveal the real origin to a clever prober
        proxy_hide_header       X-Powered-By;
        proxy_hide_header       x-amz-id-2;
        proxy_hide_header       x-amz-request-id;
        proxy_hide_header       CF-Ray;
        proxy_hide_header       CF-Cache-Status;

        add_header              X-Content-Type-Options "nosniff"   always;

        proxy_connect_timeout   5s;
        proxy_read_timeout      15s;
    }
}
